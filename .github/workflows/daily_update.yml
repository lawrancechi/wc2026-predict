name: Daily World Cup Prediction Update

on:
  schedule:
    # 每天 UTC 06:00 (台灣時間 14:00) 自動跑
    - cron: '0 6 * * *'
  workflow_dispatch:
    # 也可在 GitHub 手動觸發（Push 新賽果後立即更新）

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install R packages
        run: Rscript -e "install.packages('jsonlite', repos='https://cloud.r-project.org')"

      - name: Run simulation & regenerate HTML
        run: Rscript simulate.R

      - name: Commit & push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: auto-update predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
